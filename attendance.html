function extractClassName(classStr) {
    const raw = (classStr || "").trim();
    if (!raw)
        return "";
    const withoutLevel = raw.replace(/^(초등|중등|중학|고등)(?:학교)?과정\s*/, "");
    return withoutLevel.split(/[\s,]+/)[0] || "";
}
function groupByClass(list) {
    const groups = {};
    list.forEach((s) => {
        const key = extractClassName(s.class) || "반 미지정";
        (groups[key] = groups[key] || []).push(s);
    });
    const keys = Object.keys(groups).sort((a, b) => {
        if (a === "반 미지정")
            return 1;
        if (b === "반 미지정")
            return -1;
        return a.localeCompare(b, "ko");
    });
    return keys.map((k) => ({ className: k, list: groups[k] }));
}

function parseTimeRange(str) {
    const s = (str || "").trim();

        return { start: "", end: "" };

function addMinutesToTime(timeStr, minutes) {
    if (!timeStr)
        return "";
    const [h, m] = timeStr.split(":").map(Number);
    if (Number.isNaN(h) || Number.isNaN(m))
        return "";
    const total = ((h * 60 + m + minutes) % (24 * 60) + 24 * 60) % (24 * 60);

    const mm = String(total % 60).padStart(2, "0");
    return `${hh}:${mm}`;

function groupByTime(list, timeField) {

    const level = parseClassString(s.class).courseLevel;

        return "중";
    if (level === "고등과정")

//   2) 방학식: 단독으로 보여주지 않고, 같은 학교의 다음 개학일 전날까지를 "여름방학"/"겨울방학" 기간으로 계산해서 하나의 기간 일정으로 표시
//      (단, 방학식 항목의 종료일이 직접 저장되어 있으면 자동계산 대신 그 값을 그대로 사용한다 - 수정 화면에서 직접 입력 가능)

//   4) 학교행사 중 "입학식"이 포함된 항목: "입학식"으로 표시

//   6) 그 외 학교행사(수련회/체험학습/수학여행/축제/발표회/졸업식/종업식 등)는 대시보드에는 표시하지 않음

// 각 항목은 raw 필드(date/endDate/title - DB에 실제 저장된 값, 수정 폼에 쓰임)와

function simplifyExamTitle(title) {
    return (title || "")
        .replace(/^[12]학기\s*/, "")

function seasonOfBreak(dateStr) {

function buildMajorAcademicEvents(allEvents) {
    const common = allEvents.filter((e) => e.scope !== "학교").map((e) => ({ ...e, displayTitle: e.title, displayEndDate: e.endDate }));
    const schoolEvents = allEvents.filter((e) => e.scope === "학교");
    const major = [];
    // 학교별로 묶어서, 방학식 -> 그 학교의 다음 개학 이벤트를 찾아 기간으로 변환한다.
    const bySchool = {};
    schoolEvents.forEach((e) => { (bySchool[e.school] = bySchool[e.school] || []).push(e); });
    Object.keys(bySchool).forEach((school) => {
        const evs = bySchool[school].slice().sort((a, b) => (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
        evs.forEach((e) => {
            if (e.type === "시험") {
                major.push({ ...e, displayTitle: simplifyExamTitle(e.title), displayEndDate: e.endDate });
            } else if (e.type === "개학") {
                major.push({ ...e, displayTitle: "개학", displayEndDate: e.endDate });
            } else if (e.type === "방학식") {
                // 종료일을 원장님이 직접 입력해서 저장해둔 경우 그 값을 그대로 쓰고,
                // 없으면(비어있으면) 같은 학교의 다음 개학일 전날로 자동 계산한다.
                let endDate = e.endDate;
                if (!endDate) {
                    const next = evs.find((o) => o.type === "개학" && o.date > e.date);
                    endDate = next ? addDays(next.date, -1) : e.date;
                }
                major.push({ ...e, displayTitle: seasonOfBreak(e.date), displayEndDate: endDate });
            } else if (e.type === "학교행사") {
                if (e.title.includes("입학식")) {
                    major.push({ ...e, displayTitle: "입학식", displayEndDate: e.endDate });
                } else if (/학력평가|모의고사|모의평가/.test(e.title)) {
                    major.push({ ...e, displayTitle: "학력평가", displayEndDate: e.endDate, _assessment: true });
                }
                // 그 외 학교행사(수련회/체험학습/수학여행/축제 등)는 대시보드 주요일정에서 제외
            }
        });
    });
    // 학력평가는 같은 날짜끼리 묶어서 학교 구분 없이 한 건으로 합친다 (수능처럼 전교생 공통 일정 취급).
    // 여러 학교의 원본 행이 하나로 합쳐지는 것이라 특정 하나의 id로 수정할 수 없으므로 _merged 표시를 해둔다.
    const assessmentDates = new Set();
    const merged = [];
    major.forEach((e) => {
        if (e._assessment) {
            if (assessmentDates.has(e.date)) return;
            assessmentDates.add(e.date);
            merged.push({ ...e, school: null, scope: "전체", _merged: true });
        } else {
            merged.push(e);
        }
    });
    return common.concat(merged);
}

// 음력 날짜 변환은 Intl의 'dangi'(한국 전통 음력) 캘린더를 이용한다 - 브라우저/서버의 ICU 데이터가

// 특정 연도의 공휴일을 전부 계산해서 [{date, title, type}] 배열로 반환한다.

// 토·일요일과 겹치면 그 뒤 첫 평일(이미 다른 공휴일인 날은 건너뜀)이 대체공휴일로 지정된다.
// 신정·현충일·크리스마스·제헌절은 대체공휴일 대상이 아니다. 수능·선거일은 그때그때 정부가 정하는 날짜라
// 규칙으로 예측할 수 없어서 자동 계산 대상에서 제외하고 계속 수동 입력한다.
function computeAutoHolidays(year) {
    const rows = [];
    const add = (date, title) => date && rows.push({ date, title });
    add(`${year}-01-01`, "신정");
    add(`${year}-03-01`, "삼일절");
    add(`${year}-05-05`, "어린이날");
    add(`${year}-06-06`, "현충일");
    if (year >= 2026)
        add(`${year}-07-17`, "제헌절"); // 2026년부터 18년 만에 법정공휴일로 부활
    add(`${year}-08-15`, "광복절");
    add(`${year}-10-03`, "개천절");
    add(`${year}-10-09`, "한글날");
    add(`${year}-12-25`, "크리스마스");
    const seollal = findSolarDateForLunar(year, 1, 1);
    const chuseok = findSolarDateForLunar(year, 8, 15);
    const buddha = findSolarDateForLunar(year, 4, 8);
    if (seollal) {
        add(addDays(seollal, -1), "설날 연휴");
        add(seollal, "설날");
        add(addDays(seollal, 1), "설날 연휴");
    }
    if (chuseok) {
        add(addDays(chuseok, -1), "추석 연휴");
        add(chuseok, "추석");
        add(addDays(chuseok, 1), "추석 연휴");
    }
    add(buddha, "부처님오신날");
    // 대체공휴일 계산: 대상 그룹별로 주말과 겹치는 날 수만큼, 그룹이 끝난 다음날부터 순서대로
    // (주말이 아니고 이미 공휴일도 아닌) 평일을 찾아 대체공휴일로 지정한다.
    const holidaySet = new Set(rows.map((r) => r.date));
    const isWeekend = (dateStr) => { const wd = new Date(dateStr + "T00:00:00").getDay(); return wd === 0 || wd === 6; };
    const substituteGroups = [
        { label: "설날", dates: seollal ? [addDays(seollal, -1), seollal, addDays(seollal, 1)] : [], end: seollal ? addDays(seollal, 1) : null },
        { label: "추석", dates: chuseok ? [addDays(chuseok, -1), chuseok, addDays(chuseok, 1)] : [], end: chuseok ? addDays(chuseok, 1) : null },
        { label: "어린이날", dates: [`${year}-05-05`], end: `${year}-05-05` },
        { label: "삼일절", dates: [`${year}-03-01`], end: `${year}-03-01` },
        { label: "광복절", dates: [`${year}-08-15`], end: `${year}-08-15` },
        { label: "개천절", dates: [`${year}-10-03`], end: `${year}-10-03` },
        { label: "한글날", dates: [`${year}-10-09`], end: `${year}-10-09` },
        { label: "부처님오신날", dates: buddha ? [buddha] : [], end: buddha },
    ];
    substituteGroups.forEach((g) => {
        if (!g.end)
            return;
        let needed = g.dates.filter(isWeekend).length;
        let cursor = g.end;
        let guard = 0;
        while (needed > 0 && guard < 14) {
            cursor = addDays(cursor, 1);
            guard++;
            if (isWeekend(cursor))
                continue;
            if (holidaySet.has(cursor))
                continue;

            holidaySet.add(cursor);
            needed--;
        }
    });
    return rows.map((r) => ({ date: r.date, title: r.title, type: r.title.startsWith("설날") || r.title.startsWith("추석") ? "명절" : "공휴일" }));
}

// 저정밀 태양좌표 공식 - 시간 오차 1분 이내)으로 구현했다. 이 방식은 "1900년 기준 평균 속도로 날짜를 어림

// 기존 슬롯의 시간을 "적용일" 기준으로 변경. 그 슬롯의 전체 이력을 다시 불러와서 적용일 순서로
// 재정렬한 뒤, 각 구간의 effective_to를 다음 구간 시작일 전날로 맞춰 저장한다(saveHistorySnapshot과 동일한 방식).
async function saveWorkScheduleSnapshot(assistantId, day, effectiveFrom, snapshot) {
    const existing = await fetchWorkScheduleHistory(assistantId, day);
    const withoutSameDate = existing.filter((r) => r.effectiveFrom !== effectiveFrom);
    const newRow = { effectiveFrom, effectiveTo: null, ...snapshot, isNew: true };
    const merged = [...withoutSameDate.map((r) => ({ ...r, isNew: false })), newRow]
        .sort((a, b) => (a.effectiveFrom < b.effectiveFrom ? -1 : a.effectiveFrom > b.effectiveFrom ? 1 : 0));
    for (let i = 0; i < merged.length; i++) {
        merged[i].effectiveTo = i === merged.length - 1 ? null : addDays(merged[i + 1].effectiveFrom, -1);
    }
    for (const row of merged) {
        const payload = { effective_to: row.effectiveTo, start_time: row.start, end_time: row.end, note: row.note };
        if (row.isNew) {
            const { error } = await supabaseClient.from("attn_work_schedules").insert({ assistant_id: assistantId, day_of_week: day, effective_from: row.effectiveFrom, ...payload });
            if (error) throw error;
        } else {
            const { error } = await supabaseClient.from("attn_work_schedules").update(payload).eq("id", row.id);
            if (error) throw error;
        }
    }
}

    const [loading, setLoading] = useState(true);
    const [form, setForm] = useState(emptyAcademicEventForm());
    const [showForm, setShowForm] = useState(false);
    const [saving, setSaving] = useState(false);
    // 학교 필터: 범례에서 넘어온 typeFilter(유형)와 별개로, 여기서 학교를 골라 그 학교 것만 볼 수 있다.
    const [schoolListFilter, setSchoolListFilter] = useState("전체");
    const schoolOptions = useMemo(() => {
        const set = new Set();
        (students || []).forEach((s) => { if (s.school && s.school.trim()) set.add(s.school.trim()); });
        return Array.from(set).sort((a, b) => a.localeCompare(b, "ko"));
    }, [students]);
    const load = async () => {
        setLoading(true);
        try {
            // 절기(24절기)는 자동 등록되는 참고용 정보일 뿐 원장님이 직접 관리하는
            // "학사일정"이 아니므로 이 관리 목록에서는 제외한다(대시보드 캘린더 표시는 별도 로직으로 그대로 유지됨).
            setEvents((await fetchAllAcademicEvents()).filter((e) => e.type !== "절기"));
        } catch (e) {
            console.error(e);
        }
        setLoading(false);
    };
    useEffect(() => { load(); }, []);
    useEffect(() => {
        const channel = supabaseClient
            .channel("attn_academic_events_mgmt_changes")
            .on("postgres_changes", { event: "*", schema: "public", table: "attn_academic_events" }, () => load())
            .subscribe();
        return () => { supabaseClient.removeChannel(channel); };
    }, []);
    // "유형: 전체"로 볼 때 목록을 유형별로 접어두는 아코디언 상태. true인 유형만 펼쳐진다.
    const [expandedGroups, setExpandedGroups] = useState({});
    const toggleGroup = (k) => setExpandedGroups((prev) => ({ ...prev, [k]: !prev[k] }));
    const save = async () => {
        if (!form.title.trim()) { alert("일정 제목을 입력해주세요."); return; }
        if (form.scope === "학교" && !form.school.trim()) { alert("적용 학교를 입력해주세요."); return; }
        setSaving(true);
        try {
            if (form.id) {
                await updateAcademicEventRow(form.id, form);
            } else {
                await addAcademicEventRow(form);
            }
            // 방금 저장한 유형의 그룹을 펼쳐서, 접힌 목록 속으로 사라진 것처럼 보이지 않게 한다.
            setExpandedGroups((prev) => ({ ...prev, [form.type]: true }));
            setForm(emptyAcademicEventForm());
            setShowForm(false);
            await load();
        } catch (e) {
            alert("저장 중 오류: " + e.message);
        }
        setSaving(false);
    };
    const startEdit = (e) => {
        setForm({ id: e.id, date: e.date, endDate: e.endDate || "", title: e.title, type: e.type, scope: e.scope, school: e.school || "" });
        setShowForm(true);
        // 수정하려는 항목의 그룹이 접혀있으면 함께 펼쳐서 바로 보이게 한다.
        setExpandedGroups((prev) => ({ ...prev, [e.type]: true }));
    };
    const cancelForm = () => { setShowForm(false); setForm(emptyAcademicEventForm()); };
    const remove = async (id) => {
        if (!confirm("이 일정을 삭제할까요?")) return;
        try {
            await deleteAcademicEventRow(id);
            await load();
        } catch (e) {
            alert("삭제 중 오류: " + e.message);
        }
    };
    // 범례 클릭(typeFilter)과 학교 필터(schoolListFilter)를 함께 적용해서 목록을 좁힌다.
    // 특정 유형으로 필터링해서 볼 때는 학교별로 묶어서 보기 편하도록 학교 이름순으로 다시 정렬한다.
    const visibleEvents = useMemo(() => {
        let list = events;
        if (typeFilter && typeFilter !== "전체") list = list.filter((e) => e.type === typeFilter);
        if (schoolListFilter !== "전체") list = list.filter((e) => e.scope !== "학교" || e.school === schoolListFilter);
        if (typeFilter && typeFilter !== "전체") {
            list = list.slice().sort((a, b) => (a.school || "").localeCompare((b.school || ""), "ko") || (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
        }
        return list;
    }, [events, typeFilter, schoolListFilter]);
    // 종류별로 "제목" 칸에 뭘 적어야 할지 감이 오도록 안내 문구를 다르게 보여준다.
    // 학교행사는 수련회/축제/체육대회처럼 그때그때 종류가 계속 바뀌므로 별도 칸을 만들지 않고,
    // 이 제목 칸에 자유롭게 적도록 안내만 명확히 한다.
    const titlePlaceholderByType = {
        방학식: "예: 여름방학식, 겨울방학식",
        개학: "예: 2학기 개학",
        시험: "예: 중간고사, 기말고사",
        학교행사: "예: 수련회, 축제, 체육대회, 사제동행",
    };
    const titlePlaceholder = (form.scope === "학교" && titlePlaceholderByType[form.type]) || "예: 수능일, 설날, 여름방학";
    // 등록/수정 폼의 입력 필드들 - "새 일정 추가"(맨 위)와 "기존 일정 수정"(그 항목 바로 아래)에서 공통으로 사용한다.
    const formFields = React.createElement(
        "div",
        { className: "grid grid-cols-1 sm:grid-cols-2 gap-3" },
        React.createElement(
            "div",
            null,
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, "시작일"),
            React.createElement("input", { type: "date", value: form.date, onChange: (e) => setForm({ ...form, date: e.target.value }), className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` } })
        ),
        React.createElement(
            "div",
            null,
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, "종료일 (기간 일정이면 입력, 아니면 비워두세요)"),
            React.createElement("input", { type: "date", value: form.endDate, onChange: (e) => setForm({ ...form, endDate: e.target.value }), className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` } })
        ),
        React.createElement(
            "div",
            { className: "sm:col-span-2" },
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, form.scope === "학교" && form.type === "학교행사" ? "제목 (행사명을 적어주세요)" : "제목"),
            React.createElement("input", { value: form.title, onChange: (e) => setForm({ ...form, title: e.target.value }), placeholder: titlePlaceholder, className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` } })
        ),
        React.createElement(
            "div",
            null,
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, "종류"),
            React.createElement(
                "select",
                { value: form.type, onChange: (e) => setForm({ ...form, type: e.target.value }), className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` } },
                (form.scope === "학교" ? SCHOOL_EVENT_TYPES : ACADEMIC_EVENT_TYPES).map((t) => React.createElement("option", { key: t, value: t }, t))
            )
        ),
        React.createElement(
            "div",
            null,
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, "적용범위"),
            React.createElement(
                "select",
                {
                    value: form.scope,
                    onChange: (e) => {
                        const nextScope = e.target.value;
                        setForm({ ...form, scope: nextScope, type: nextScope === "학교" ? "방학식" : "기타" });
                    },
                    className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` }
                },
                React.createElement("option", { value: "전체" }, "전체 공통"),
                React.createElement("option", { value: "학교" }, "특정 학교")
            )
        ),
        form.scope === "학교" && React.createElement(
            "div",
            { className: "sm:col-span-2" },
            React.createElement("label", { style: { fontSize: 12, fontWeight: 700, color: SUBINK } }, "적용 학교"),
            React.createElement("input", {
                value: form.school, onChange: (e) => setForm({ ...form, school: e.target.value }),
                placeholder: "예: 경산여중 (목록에 없으면 직접 입력)", list: "academic-school-options",
                className: "w-full px-3 py-2 rounded-lg text-sm outline-none mt-1", style: { border: `1px solid ${LINE}` }
            }),
            React.createElement("datalist", { id: "academic-school-options" }, schoolOptions.map((s) => React.createElement("option", { key: s, value: s })))
        )
    );
    const formButtons = React.createElement(
        "div",
        { className: "flex gap-2 mt-4" },
        React.createElement("button", { onClick: save, disabled: saving, className: "px-5 py-2 rounded-lg text-sm font-bold", style: { background: PURPLE, color: "#fff", opacity: saving ? 0.6 : 1 } }, saving ? "저장 중..." : (form.id ? "수정 저장" : "저장")),
        React.createElement("button", { onClick: cancelForm, className: "px-5 py-2 rounded-lg text-sm font-bold", style: { background: "#f0f0ee", color: SUBINK } }, "취소")
    );
    // "+ 일정 추가"로 연 새 일정 등록 폼은 맨 위에 뜬다. 기존 일정 수정(form.id 있음)은 그 항목 바로 아래에 펼쳐지므로 여기선 안 띄운다.
    const formCard = showForm && isDirector && !form.id && React.createElement(
        "div",
        { className: "rounded-2xl p-5 mb-5", style: { background: "#fff", border: `1.5px solid ${PURPLE}` } },
        React.createElement("div", { style: { fontWeight: 800, fontSize: 15, marginBottom: 12 } }, "연간 학사일정 추가"),
        formFields,
        formButtons
    );
    // 항목 하나를 행(+ 수정 중이면 그 아래 수정 폼)으로 그린다. "유형: 전체" 아코디언과
    // 특정 유형으로 필터링된 목록 양쪽에서 공통으로 쓴다.
    const renderRow = (e) => {
        const row = React.createElement(
            "div",
            { key: e.id, className: "flex items-center justify-between gap-3 px-5 py-3 flex-wrap", style: { borderBottom: `1px solid ${LINE}` } },
            React.createElement(
                "div",
                { className: "flex items-center gap-3 min-w-0 flex-wrap" },
                React.createElement("span", { style: { fontSize: 11, fontWeight: 700, color: "#fff", background: ACADEMIC_EVENT_COLORS[e.type] || SUBINK, borderRadius: 6, padding: "2px 7px", flexShrink: 0 } }, e.type),
                React.createElement("span", { style: { fontSize: 12.5, color: SUBINK, flexShrink: 0 } }, e.date + (e.endDate && e.endDate !== e.date ? " ~ " + e.endDate : "")),
                React.createElement("span", { style: { fontSize: 13.5, fontWeight: 700 } }, e.title),
                e.scope === "학교" && e.school && React.createElement("span", { style: { fontSize: 11, color: SUBINK } }, "(" + e.school + ")")
            ),
            isDirector && React.createElement(
                "div",
                { className: "flex items-center gap-3 flex-shrink-0" },
                React.createElement("button", { onClick: () => startEdit(e), style: { color: SUBINK } }, "✏️"),
                React.createElement("button", { onClick: () => remove(e.id), style: { color: SUBINK } }, "🗑")
            )
        );
        // 이 항목을 수정 중이면, 바로 아래에 수정 폼을 펼쳐서 스크롤 없이 그 자리에서 고칠 수 있게 한다.
        if (showForm && isDirector && form.id === e.id) {
            return React.createElement(
                React.Fragment,
                { key: "wrap" + e.id },
                row,
                React.createElement(
                    "div",
                    { className: "p-5", style: { background: PAPER, borderBottom: `1px solid ${LINE}` } },
                    React.createElement("div", { style: { fontWeight: 800, fontSize: 14, marginBottom: 12 } }, "일정 수정"),
                    formFields,
                    formButtons
                )
            );
        }
        return row;
    };
    // "유형: 전체"일 때는 200개 가까운 항목을 쭉 나열하는 대신, 유형별로 묶어 접어둔다
    // (범례 순서와 같은 순서로: 공휴일→명절→수능→학원휴무→학원일정→방학식→개학→시험→학교행사→기타).
    // 특정 유형으로 이미 필터링된 상태(범례 클릭 등)라면 그룹핑 없이 기존처럼 평평한 목록으로 보여준다.
    const groupedByType = useMemo(() => {
        if (typeFilter && typeFilter !== "전체") return null;
        const groups = {};
        visibleEvents.forEach((e) => { (groups[e.type] = groups[e.type] || []).push(e); });
        // 학교별 일정(방학식/시험 등)이 섞인 그룹은 학교 이름순 → 날짜순으로 정렬해 같은 학교끼리 모아 보이게 한다.
        Object.keys(groups).forEach((k) => {
            groups[k] = groups[k].slice().sort((a, b) => (a.school || "").localeCompare((b.school || ""), "ko") || (a.date < b.date ? -1 : a.date > b.date ? 1 : 0));
        });
        return groups;
    }, [visibleEvents, typeFilter]);
    const rows = groupedByType
        ? Object.keys(ACADEMIC_EVENT_COLORS).filter((k) => groupedByType[k] && groupedByType[k].length > 0).map((k) => {
              const list = groupedByType[k];
              const isOpen = !!expandedGroups[k];
              return React.createElement(
                  React.Fragment,
                  { key: "grp" + k },
                  React.createElement(
                      "button",
                      { onClick: () => toggleGroup(k), className: "w-full flex items-center justify-between gap-2 px-5 py-3", style: { borderBottom: `1px solid ${LINE}`, background: isOpen ? PAPER : "#fff" } },
                      React.createElement(
                          "div", { className: "flex items-center gap-2" },
                          React.createElement("span", { style: { width: 8, height: 8, borderRadius: 999, background: ACADEMIC_EVENT_COLORS[k] || SUBINK, display: "inline-block", flexShrink: 0 } }),
                          React.createElement("span", { style: { fontSize: 13.5, fontWeight: 800 } }, k),
                          React.createElement("span", { style: { fontSize: 12, color: SUBINK } }, "(" + list.length + "건)")
                      ),
                      React.createElement("span", { style: { fontSize: 12, color: SUBINK } }, isOpen ? "▲ 접기" : "▼ 펼치기")
                  ),
                  isOpen && list.map(renderRow)
              );
          })
        : visibleEvents.map(renderRow);
    return React.createElement(
        "div",
        null,
        React.createElement(
            "div",
            { className: "flex items-center justify-between mb-2 flex-wrap gap-2" },
            React.createElement("div", { style: { fontWeight: 800, fontSize: 15 } }, "연간 학사일정 (" + visibleEvents.length + "건)"),
            isDirector && !showForm && React.createElement("button", { onClick: () => setShowForm(true), className: "px-4 py-2 rounded-lg text-sm font-bold", style: { background: PURPLE, color: "#fff" } }, "+ 일정 추가")
        ),
        React.createElement("p", { style: { color: SUBINK, fontSize: 12.5, marginBottom: 14 } }, "여기서 등록한 일정은 대시보드·업무공지 캘린더 등 앱 전체 캘린더에 자동으로 표시됩니다."),
        React.createElement(
            "div",
            { className: "flex flex-wrap gap-2 mb-4" },
            React.createElement(
                "select",
                { value: typeFilter || "전체", onChange: (e) => setTypeFilter && setTypeFilter(e.target.value), className: "px-2 py-1.5 rounded-lg text-xs outline-none", style: { border: `1px solid ${LINE}`, color: SUBINK } },
                React.createElement("option", { value: "전체" }, "유형: 전체"),
                Object.keys(ACADEMIC_EVENT_COLORS).map((k) => React.createElement("option", { key: k, value: k }, k))
            ),
            schoolOptions.length > 0 && React.createElement(
                "select",
                { value: schoolListFilter, onChange: (e) => setSchoolListFilter(e.target.value), className: "px-2 py-1.5 rounded-lg text-xs outline-none", style: { border: `1px solid ${LINE}`, color: SUBINK } },
                React.createElement("option", { value: "전체" }, "학교: 전체"),
                schoolOptions.map((s) => React.createElement("option", { key: s, value: s }, s))
            )
        ),
        formCard,
        React.createElement(
            "div",
            { className: "rounded-2xl overflow-hidden", style: { background: "#fff", border: `1px solid ${LINE}` } },
            loading
                ? React.createElement("div", { style: { color: SUBINK, fontSize: 13, textAlign: "center", padding: "30px 0" } }, "불러오는 중...")
                : visibleEvents.length === 0
                    ? React.createElement("div", { style: { color: SUBINK, fontSize: 13, textAlign: "center", padding: "30px 0" } }, "등록된 학사일정이 없습니다.")
                    : rows
        )
    );
}

// 로그인 후 12시간이 지나면 자동 로그아웃 - 학원 공용 컴퓨터에 로그인 정보가 계속 남아있는 걸 방지.
// (기본은 로그인 정보가 브라우저에 저장되어 창을 닫아도 로그인이 풀리지 않는데, 그 대신 여기서 시간 제한을 둠)
const LOGIN_AT_KEY = "attn_login_at";
const AUTO_LOGOUT_MS = 12 * 60 * 60 * 1000;
function Root() {
    const [session, setSession] = useState(null);
    const [checked, setChecked] = useState(false);
    useEffect(() => {
        const checkAutoLogout = () => {
            const loginAt = Number(localStorage.getItem(LOGIN_AT_KEY) || 0);
            if (loginAt && Date.now() - loginAt > AUTO_LOGOUT_MS) {
                supabaseClient.auth.signOut();
            }
        };
        supabaseClient.auth.getSession().then(({ data }) => {
            // 이미 로그인되어 있는데 시작 시각 기록이 없는 경우(이 기능 배포 전부터 로그인돼있던 경우) - 지금을 기준으로 새로 시작
            if (data.session && !localStorage.getItem(LOGIN_AT_KEY)) {
                localStorage.setItem(LOGIN_AT_KEY, String(Date.now()));
            }
            checkAutoLogout();
            setSession(data.session);
            setChecked(true);
        });
        const { data: sub } = supabaseClient.auth.onAuthStateChange((event, s) => {
            if (event === "SIGNED_IN") {
                localStorage.setItem(LOGIN_AT_KEY, String(Date.now()));
            } else if (event === "SIGNED_OUT") {
                localStorage.removeItem(LOGIN_AT_KEY);
            }
            setSession(s);
        });
        // 탭을 오래 켜둔 채로 있는 경우를 대비해 5분마다 시간 제한 초과 여부를 다시 확인
        const timer = setInterval(checkAutoLogout, 5 * 60 * 1000);
        return () => { sub.subscription.unsubscribe(); clearInterval(timer); };
    }, []);
    if (!checked) {
        return React.createElement("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", color: SUBINK, fontSize: 13 } }, "\uBD88\uB7EC\uC624\uB294 \uC911...");
    }
    return session ? React.createElement(MainApp, { session: session }) : React.createElement(LoginScreen, null);
}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(Root, null));

</script>
</body>
