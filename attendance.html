function groupByClass(list) {
    const groups = {};
    list.forEach((s) => {
        const level = parseClassString(s.class).courseLevel;
        const key = level || "반 미지정";
        (groups[key] = groups[key] || []).push(s);
    });
    const keys = Object.keys(groups).sort((a, b) => {
        if (a === "반 미지정")
            return 1;
        if (b === "반 미지정")
            return -1;
        return a.localeCompare(b, "ko");
    });
    return keys.map((k) => ({ className: k, list: groups[k] }));
}
function groupByTime(list, timeField) {
    const groups = {};
    list.forEach((s) => {
        const key = s[timeField] && s[timeField].trim() ? s[timeField].trim() : "\uC2DC\uAC04 \uBBF8\uC9C0\uC815";
        (groups[key] = groups[key] || []).push(s);
    });
    const keys = Object.keys(groups).sort((a, b) => {
        if (a === "\uC2DC\uAC04 \uBBF8\uC9C0\uC815")
            return 1;
        if (b === "\uC2DC\uAC04 \uBBF8\uC9C0\uC815")
            return -1;
        return a.localeCompare(b);
    });
    return keys.map((k) => ({ className: k, list: groups[k] }));
}
function groupByGrade(list) {
    const groups = {};

        const key = g ? `${g}\uD559\uB144` : "\uD559\uB144 \uBBF8\uC9C0\uC815";
        (groups[key] = groups[key] || []).push(s);

function fmt(d) {
    const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, "0"), day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
}
function todayStr() { return fmt(new Date()); }
function korWeekdayOf(dateStr) {
    return JS_DAY_TO_KOR[new Date(dateStr + "T00:00:00").getDay()];
}
function formatMD(dateStr) {
    if (!dateStr)
        return "";
    const parts = dateStr.split("-");
    if (parts.length !== 3)
        return dateStr;
    const m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
    return `${m}/${d}(${korWeekdayOf(dateStr)})`;
}
function monthLabel(d) { return `${d.getFullYear()}년 ${d.getMonth() + 1}월`; }
function buildMonthGrid(d) {
    const year = d.getFullYear(), month = d.getMonth();
    const startOffset = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startOffset; i++)
        cells.push(null);
    for (let day = 1; day <= daysInMonth; day++)
        cells.push(new Date(year, month, day));
    while (cells.length % 7 !== 0)
        cells.push(null);
    return cells;
}

        days: row.days || [], phone: row.phone || "", memo: row.memo || "",

        regularTime: row.regular_time || "",

async function upsertStudent(form) {
    const payload = {
        name: form.name, class: form.class, school: form.school, grade: form.grade, days: form.days,
        phone: form.phone, memo: form.memo, clinic: form.clinic, clinic_days: form.clinicDays,
        clinic_time: form.clinicTime, regular_time: form.regularTime || null, enroll_date: form.enrollDate || null,
    };
    if (form.id) {
        const { error } = await supabaseClient.from("attn_students").update(payload).eq("id", form.id);
        if (error)
            throw error;
    }
    else {
        const { error } = await supabaseClient.from("attn_students").insert(payload);
        if (error)
            throw error;
    }
}

async function fetchEventsForMonth(monthDate) {
    const year = monthDate.getFullYear(), month = monthDate.getMonth();
    const start = fmt(new Date(year, month, 1));
    const end = fmt(new Date(year, month + 1, 0));
    const { data, error } = await supabaseClient.from("attn_events").select("*").gte("event_date", start).lte("event_date", end);
    if (error)
        throw error;
    const grouped = {};
    data.forEach((r) => {
        if (!grouped[r.event_date])
            grouped[r.event_date] = [];
        grouped[r.event_date].push({ id: r.id, title: r.title });
    });
    return grouped;
}
