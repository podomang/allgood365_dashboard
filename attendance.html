function extractClassName(classStr) {
    const raw = (classStr || "").trim();
    if (!raw)
        return "";
    const withoutLevel = raw.replace(/^(초등|중등|중학|고등)(?:학교)?과정\s*/, "");
    return withoutLevel.split(/[\s,]+/)[0] || "";
}
function groupByClass(list) {
    const groups = {};
    list.forEach((s) => {
        const key = extractClassName(s.class) || "반 미지정";
        (groups[key] = groups[key] || []).push(s);
    });
    const keys = Object.keys(groups).sort((a, b) => {
        if (a === "반 미지정")
            return 1;
        if (b === "반 미지정")
            return -1;
        return a.localeCompare(b, "ko");
    });
    return keys.map((k) => ({ className: k, list: groups[k] }));
}
function groupByTime(list, timeField) {
    const groups = {};

        (groups[key] = groups[key] || []).push(s);

function schoolLevelOf(s) {
    // 실제 다니는 학교명이 학년 단계의 진짜 기준이라 항상 먼저 확인한다. "수강과정"(중등과정/고등과정)은
    // 선행학습 반 이름일 뿐이라 실제 학교와 다를 수 있다 (예: 초등학교 6학년이 "중등과정 예비중" 반을
    // 듣는 경우 - courseLevel을 먼저 보면 "중6학년"이라는 있을 수 없는 조합이 나와버린다).
    const school = s.school || "";
    if (school.includes("초등") || /초$/.test(school))
        return "초";
    if (school.includes("중학") || /중$/.test(school))
        return "중";
    if (school.includes("고등") || /고$/.test(school))
        return "고";
    // 학교명이 비어있거나 위 패턴과 안 맞을 때만 수강과정으로 대체 추정한다.
    const level = parseClassString(s.class).courseLevel;
    if (level === "중등과정")
        return "중";
    if (level === "고등과정")
        return "고";
    return "";
}
function groupByGrade(list) {
    const buckets = {};
    list.forEach((s) => {
        const gradeNum = s.grade && String(s.grade).trim();
        const lvl = schoolLevelOf(s);
        const key = gradeNum ? `${lvl}${gradeNum}\uD559\uB144` : "\uD559\uB144 \uBBF8\uC9C0\uC815";
        if (!buckets[key])
            buckets[key] = { level: lvl, grade: gradeNum ? parseInt(gradeNum, 10) || 0 : 0, list: [] };
        buckets[key].list.push(s);
    });
    const levelOrder = { "\uCD08": 0, "\uC911": 1, "\uACE0": 2, "": 3 };
    const keys = Object.keys(buckets).sort((a, b) => {
        if (a === "\uD559\uB144 \uBBF8\uC9C0\uC815")
            return 1;
        if (b === "\uD559\uB144 \uBBF8\uC9C0\uC815")
            return -1;
        const A = buckets[a], B = buckets[b];
        const lo = (levelOrder[A.level] ?? 3) - (levelOrder[B.level] ?? 3);
        if (lo !== 0)
            return lo;
        return A.grade - B.grade;
    });
    return keys.map((k) => ({ className: k, list: buckets[k].list }));
}

function applyHistoryAsOf(s, historyList, dateStr) {
    const h = resolveHistoryAsOf(historyList, dateStr);
    if (!h)
        return s;
    return { ...s, school: h.school, grade: h.grade, class: h.class, regularTime: h.regularTime, clinic: h.clinic, clinicTime: h.clinicTime, clinicDays: h.clinicDays, days: h.days };

function korWeekdayOf(dateStr) {
    return JS_DAY_TO_KOR[new Date(dateStr + "T00:00:00").getDay()];

function formatMD(dateStr) {
    if (!dateStr)
        return "";
    const parts = dateStr.split("-");
    if (parts.length !== 3)
        return dateStr;
    const m = parseInt(parts[1], 10), d = parseInt(parts[2], 10);
    return `${m}/${d}(${korWeekdayOf(dateStr)})`;
}

function buildMonthGrid(d) {
    const year = d.getFullYear(), month = d.getMonth();
    const startOffset = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const cells = [];
    for (let i = 0; i < startOffset; i++)
        cells.push(null);
    for (let day = 1; day <= daysInMonth; day++)
        cells.push(new Date(year, month, day));
    while (cells.length % 7 !== 0)
        cells.push(null);
    return cells;
}

// 학생 정보를 수정할 때 호출. effectiveFrom(적용 시작일) 기준으로 이력 타임라인을 다시 계산해서 저장한다.
// 같은 날짜에 이미 이력이 있으면 그 값을 새 값으로 덮어쓰고, 나머지 구간들의 종료일도 순서에 맞게 재정렬한다.
// (오늘부터 적용은 물론, 미래 날짜 예약이나 과거 날짜 정정도 모두 이 로직 하나로 처리된다.)
async function saveHistorySnapshot(studentId, effectiveFrom, snapshot) {
    const existing = await fetchStudentHistoryRows(studentId);
    const withoutSameDate = existing.filter((r) => r.effectiveFrom !== effectiveFrom);
    const newRow = { effectiveFrom, effectiveTo: null, ...snapshot, isNew: true };
    const merged = [...withoutSameDate.map((r) => ({ ...r, isNew: false })), newRow]
        .sort((a, b) => (a.effectiveFrom < b.effectiveFrom ? -1 : a.effectiveFrom > b.effectiveFrom ? 1 : 0));
    for (let i = 0; i < merged.length; i++) {
        merged[i].effectiveTo = i === merged.length - 1 ? null : addDays(merged[i + 1].effectiveFrom, -1);
    }
    for (const row of merged) {
        const payload = {
            effective_to: row.effectiveTo, school: row.school, grade: row.grade, class: row.class,
            regular_time: row.regularTime, clinic: row.clinic, clinic_time: row.clinicTime,
            clinic_days: row.clinicDays, days: row.days,
        };
        if (row.isNew) {
            const { error } = await supabaseClient.from("attn_student_history").insert({ student_id: studentId, effective_from: row.effectiveFrom, ...payload });
            if (error)
                throw error;
        }
        else {
            const { error } = await supabaseClient.from("attn_student_history").update(payload).eq("id", row.id);
            if (error)
                throw error;
        }
    }
}

        try {
            await removeExtraRosterRow(prevTargetDate, studentId);

        catch (e) {
            console.error(e);
        }

}

function fmtTime(iso) {
    if (!iso) return "-";
    try {
        return new Date(iso).toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    } catch (e) {
        return "-";
    }
}

    if (!checkIn || !checkOut) return "-";

    if (ms <= 0) return "-";
    const h = Math.floor(ms / 3600000), m = Math.round((ms % 3600000) / 60000);
    return h + "시간 " + m + "분";
}
